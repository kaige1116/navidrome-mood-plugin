name: Build & Publish Docker Image

on:
  release:
    types: [published]
  workflow_dispatch: 

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: mood-analyzer
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      # DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ env.DOCKER_HUB_USERNAME }}
      #     password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./analyzer-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_USERNAME }}/mood-analyzer:latest
            ghcr.io/${{ env.GHCR_USERNAME }}/mood-analyzer:${{ github.event.release.tag_name }}
          # ${{ env.DOCKER_HUB_USERNAME }}/mood-analyzer:latest
          # ${{ env.DOCKER_HUB_USERNAME }}/mood-analyzer:${{ github.event.release.tag_name }}
          build-args: |
            APP_VERSION=${{ github.event.release.tag_name }}