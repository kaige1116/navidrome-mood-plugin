name: Build & Publish Docker Image

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch: 

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    env:
      IMAGE_NAME: navidrome-mood-plugin
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      # DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set lower case owner name
        run: |
          echo "GHCR_USER_LOWER=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ env.DOCKER_HUB_USERNAME }}
      #     password: ${{ env.DOCKER_HUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ env.GHCR_USER_LOWER }}
          password: ${{ env.GHCR_TOKEN }}
 
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./analyzer-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_USER_LOWER }}/navidrome-mood-plugin:latest
            ghcr.io/${{ env.GHCR_USER_LOWER }}/navidrome-mood-plugin:${{ github.ref_name }}
          # ${{ env.DOCKER_HUB_USERNAME }}/mood-analyzer:latest
          # ${{ env.DOCKER_HUB_USERNAME }}/mood-analyzer:${{ github.ref_name }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}