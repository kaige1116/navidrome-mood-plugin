name: Build Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup TinyGo
        uses: acifani/setup-tinygo@v3
        with:
          tinygo-version: '0.41.1'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build WASM
        run: make build

      - name: Package NDP
        run: make package

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mood-playlists.ndp
          path: mood-playlists.ndp

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: mood-playlists.ndp
          generate_release_notes: true
