name: Build Plugin

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup TinyGo
        uses: nicolo-ribaudo/setup-tinygo@v1
        with:
          tinygo-version: '0.35.0'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build WASM
        run: make build

      - name: Package NDP
        run: make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mood-playlists.ndp
          path: mood-playlists.ndp

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mood-playlists.ndp
          generate_release_notes: true
